<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/icon.png">
</head>
<body>
    <nav>
        <ul>
            <li>MyTicTacToe.com</li>
        </ul>
    </nav>
    <main>
        <div class="game">
            <div class="line"></div>
            <div class="box bl bt"></div>
            <div class="box bt"></div>
            <div class="box bt br"></div>
            <div class="box bl"></div>
            <div class="box"></div>
            <div class="box br"></div>
            <div class="box bl bb"></div>
            <div class="box bb"></div>
            <div class="box br bb"></div>
        </div>
        <div class="info">
            <h1>Welcome to MyTicTacToe.com</h1>
            <div>
                <p id="turnText">Turn for X</p>
                <button class="reset">RESET</button>
            </div>
            <div class="gif">
                <img src="images/excited.gif" alt="win gif">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
